services:
  dev-shell:
    image: mddsproject/dev-container:0.1.0
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: mdds-dev-shell
    working_dir: /workspaces/mdds
    command: sleep infinity
    volumes:
      - ..:/workspaces/mdds
      - /var/run/docker.sock:/var/run/docker.sock
      - mdds-maven-cache:/home/ubuntu/.m2
      - mdds-npm-cache:/home/ubuntu/.npm
      - mdds-pip-cache:/home/ubuntu/.cache/pip
      - mdds-docker-config:/home/ubuntu/.docker
    group_add:
      - "${DOCKER_GID:-119}"
    environment:
      MDDS_SERVER_HOST: localhost
      MDDS_SERVER_PORT: 8000
      PYTHON_BIN: python3.12
      PYTHONPATH: /workspaces/mdds/mdds-python-worker-runtime/src/main/python:/workspaces/mdds/mdds-examples/workers/mdds-python-worker-solving-slae/src/main/python
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_ADMIN_LOGIN: admin
      SONAR_DEFAULT_ADMIN_PASSWORD: ${SONAR_DEFAULT_ADMIN_PASSWORD:-admin}
      SONAR_ADMIN_PASSWORD: ${SONAR_ADMIN_PASSWORD:-MddsLocalSonarAdmin2026_A9xQ7mZ2}
      SONAR_TOKEN_FILE: .sonar_token
      SONAR_TOKEN_NAME: ${SONAR_TOKEN_NAME:-mdds-local-sonar-token}
    depends_on:
      - sonarqube

  sonarqube:
    image: sonarqube:26.6.0.123539-community
    container_name: mdds-sonarqube
    depends_on:
      sonarqube-postgres:
        condition: service_healthy
    ports:
      - "9021:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    volumes:
      - mdds-sonarqube-data:/opt/sonarqube/data
      - mdds-sonarqube-extensions:/opt/sonarqube/extensions
      - mdds-sonarqube-logs:/opt/sonarqube/logs

  sonarqube-postgres:
    image: postgres:17
    container_name: mdds-sonarqube-postgres
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - mdds-sonarqube-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mdds-maven-cache:
  mdds-npm-cache:
  mdds-pip-cache:
  mdds-docker-config:
  mdds-sonarqube-data:
  mdds-sonarqube-extensions:
  mdds-sonarqube-logs:
  mdds-sonarqube-postgres-data: