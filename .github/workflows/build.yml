name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build images and run tests
    runs-on: ubuntu-latest

    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Maven if missing
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y maven
            else
              apt-get update
              apt-get install -y maven
            fi
          fi
          mvn --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mdds-web-client/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Show tool versions
        run: |
          java -version
          mvn --version
          node --version
          npm --version
          python --version
          docker --version
          docker compose version
          make --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3"
          python -m pip install -r requirements.txt --build-constraint deployment/python-base/build-constraints.txt

      - name: Install web-client dependencies
        working-directory: mdds-web-client
        run: npm ci

      - name: Build Docker images
        run: make build_all_images_ci

      - name: Run tests
        run: make test_all

      - name: Run Python tests with coverage
        run: make test_python_coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: mdds-python-worker-runtime/target/python-coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
