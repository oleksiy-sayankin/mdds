name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build images and run tests
    runs-on: ubuntu-latest

    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Maven if missing
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y maven
            else
              apt-get update
              apt-get install -y maven
            fi
          fi
          mvn --version

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mdds-examples/web-clients/mdds-common-web-client/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            deployment/python-base/requirements.txt
            deployment/python-base/requirements.lock.txt
            deployment/python-base/build-constraints.txt

      - name: Show tool versions
        run: |
          java -version
          mvn --version
          node --version
          npm --version
          python --version
          docker --version
          docker compose version
          make --version

      - name: Install Python native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc \
            g++ \
            gfortran \
            pkg-config \
            libblas-dev \
            liblapack-dev

      - name: Install Python dependencies
        run: |
          python -m pip install \
            --upgrade \
            --only-binary=:all: \
            "pip==26.1.2"

          python -m pip install --no-cache-dir \
            --require-hashes \
            --build-constraint deployment/python-base/build-constraints.txt \
            -r deployment/python-base/requirements.lock.txt

          python -m pip install --no-cache-dir \
            --only-binary=:all: \
            --build-constraint deployment/python-base/build-constraints.txt \
            -r requirements.txt

          python -m pip check

      - name: Install Common Web Client dependencies
        working-directory: mdds-examples/web-clients/mdds-common-web-client
        run: npm ci --ignore-scripts

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build Docker images
        run: make build_release_images_ci

      - name: Run Java tests with coverage
        run: make test_java_coverage

      - name: Run Python tests with coverage
        run: make test_python_coverage

      - name: Run Common Web Client tests with TypeScript coverage
        run: make test_common_web_client_coverage

      - name: Run end-to-end tests
        run: make test_e2e

      - name: Prepare Java coverage file list
        run: |
          test -s target/java-coverage-files.txt

          JAVA_COVERAGE_FILES="$(paste -sd, target/java-coverage-files.txt)"

          if [ -z "${JAVA_COVERAGE_FILES}" ]; then
            echo "No Java coverage files found"
            exit 1
          fi

          echo "JAVA_COVERAGE_FILES=${JAVA_COVERAGE_FILES}" >> "$GITHUB_ENV"
          echo "Java coverage files: ${JAVA_COVERAGE_FILES}"

      - name: Upload Java coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # codecov/codecov-action@v5
        with:
          files: ${{ env.JAVA_COVERAGE_FILES }}
          flags: java
          name: java-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Python Worker Runtime coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # codecov/codecov-action@v5
        with:
          files: mdds-python-worker-runtime/target/python-coverage.xml
          flags: python-worker-runtime
          name: python-worker-runtime-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload SLAE Python Worker coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # codecov/codecov-action@v5
        with:
          files: mdds-examples/workers/mdds-python-worker-solving-slae/target/python-coverage.xml
          flags: slae-python-worker
          name: slae-python-worker-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Common Web Client coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # codecov/codecov-action@v5
        with:
          files: mdds-examples/web-clients/mdds-common-web-client/target/coverage/lcov.info
          flags: common-web-client
          name: common-web-client-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Analyze with SonarQube Cloud
        if: ${{ !env.ACT }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_KEY: oleksiy-sayankin_mdds
          SONAR_ORGANIZATION: oleksiy-sayankin
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_QUALITYGATE_WAIT: "true"
        run: make sonar_scan
