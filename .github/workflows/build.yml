name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build images and run tests
    runs-on: ubuntu-latest

    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Maven if missing
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y maven
            else
              apt-get update
              apt-get install -y maven
            fi
          fi
          mvn --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mdds-web-client/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            deployment/python-base/requirements.txt
            deployment/python-base/build-constraints.txt

      - name: Show tool versions
        run: |
          java -version
          mvn --version
          node --version
          npm --version
          python --version
          docker --version
          docker compose version
          make --version

      - name: Install Python native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc \
            g++ \
            gfortran \
            pkg-config \
            libblas-dev \
            liblapack-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3"
          python -m pip install \
            -r deployment/python-base/requirements.txt \
            -r requirements.txt \
            --build-constraint deployment/python-base/build-constraints.txt

      - name: Install web-client dependencies
        working-directory: mdds-web-client
        run: npm ci

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build Docker images
        run: make build_release_images_ci

      - name: Run Java tests with coverage
        run: make test_java_coverage

      - name: Run Python tests with coverage
        run: make test_python_coverage

      - name: Run end-to-end tests
        run: make test_e2e

      - name: Prepare Java coverage file list
        run: |
          test -s target/java-coverage-files.txt

          JAVA_COVERAGE_FILES="$(paste -sd, target/java-coverage-files.txt)"

          if [ -z "${JAVA_COVERAGE_FILES}" ]; then
            echo "No Java coverage files found"
            exit 1
          fi

          echo "JAVA_COVERAGE_FILES=${JAVA_COVERAGE_FILES}" >> "$GITHUB_ENV"
          echo "Java coverage files: ${JAVA_COVERAGE_FILES}"

      - name: Upload Java coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          files: ${{ env.JAVA_COVERAGE_FILES }}
          flags: java
          name: java-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Python coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          files: mdds-python-worker-runtime/target/python-coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: true
          disable_search: true
          plugins: noop
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Analyze with SonarQube Cloud
        if: ${{ !env.ACT }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # githubactions:S8544 is suppressed for build.yml because Sonar treats
          # pip install -r as unlocked even though project requirements files pin
          # all direct dependencies. A hash-based lock file is a separate future
          # hardening task.
          mvn -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=oleksiy-sayankin_mdds \
            -Dsonar.organization=oleksiy-sayankin \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths="${JAVA_COVERAGE_FILES}" \
            -Dsonar.python.coverage.reportPaths=mdds-python-worker-runtime/target/python-coverage.xml \
            -Dsonar.issue.ignore.multicriteria=e1 \
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S8544 \
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/build.yml \
            -Dsonar.qualitygate.wait=true
