services:
  rabbitmq:
    image: rabbitmq:3.13-management
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7.4
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  grpc-server:
    image: mddsproject/grpc-server:0.1.0
    environment:
      MDDS_EXECUTOR_GRPC_SERVER_HOST: 0.0.0.0
      MDDS_EXECUTOR_GRPC_SERVER_PORT: 50051
    expose:
      - "50051"
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=localhost:50051" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  executor:
    image: mddsproject/executor:0.1.0
    command: ["java", "-jar", "/opt/mdds/mdds-executor/mdds-executor.jar"]
    depends_on:
      grpc-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MDDS_EXECUTOR_HOST: 0.0.0.0
      MDDS_EXECUTOR_PORT: 35232
      MDDS_EXECUTOR_WEBAPP_DIR_LOCATION: /opt/mdds/mdds-executor
      MDDS_EXECUTOR_GRPC_SERVER_HOST: grpc-server
      MDDS_EXECUTOR_GRPC_SERVER_PORT: 50051
      MDDS_RABBITMQ_HOST: rabbitmq
      MDDS_RABBITMQ_PORT: 5672
      MDDS_RABBITMQ_USER: guest
      MDDS_RABBITMQ_PASSWORD: guest
    expose:
      - "35232"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:35232/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  web-server:
    image: mddsproject/web-server:0.1.0
    command: ["java", "-jar", "/opt/mdds/mdds-web-server/mdds-web-server.jar"]
    depends_on:
      executor:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MDDS_SERVER_HOST: 0.0.0.0
      MDDS_SERVER_PORT: 8000
      MDDS_SERVER_WEBAPP_DIR_LOCATION: /opt/mdds/mdds-web-server/web-app
      MDDS_RABBITMQ_HOST: rabbitmq
      MDDS_RABBITMQ_PORT: 5672
      MDDS_RABBITMQ_USER: guest
      MDDS_RABBITMQ_PASSWORD: guest
      MDDS_REDIS_HOST: redis
      MDDS_REDIS_PORT: 6379
      MDDS_METADATA_STORAGE_JDBC_URL: jdbc:postgresql://postgres:5432/mdds
      MDDS_METADATA_STORAGE_USER: mdds
      MDDS_METADATA_STORAGE_PASSWORD: mdds123
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  result-consumer:
    image: mddsproject/result-consumer:0.1.0
    command: ["java", "-jar", "/opt/mdds/mdds-result-consumer/mdds-result-consumer.jar"]
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MDDS_RESULT_CONSUMER_HOST: 0.0.0.0
      MDDS_RESULT_CONSUMER_PORT: 8863
      MDDS_RESULT_CONSUMER_WEBAPP_DIR_LOCATION: /opt/mdds/mdds-result-consumer
      MDDS_RABBITMQ_HOST: rabbitmq
      MDDS_RABBITMQ_PORT: 5672
      MDDS_RABBITMQ_USER: guest
      MDDS_RABBITMQ_PASSWORD: guest
      MDDS_REDIS_HOST: redis
      MDDS_REDIS_PORT: 6379
    expose:
      - "8863"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8863/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    user: root
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_REGION_NAME: us-east-1
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 2s
      retries: 20


  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        mc alias set mdds http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        mc mb --ignore-existing mdds/mdds
        mc anonymous set none mdds/mdds
    restart: "no"

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: mdds
      POSTGRES_USER: mdds
      POSTGRES_PASSWORD: mdds123
      TZ: UTC
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s


  selenium:
    image: selenium/standalone-chrome:4.31.0-20250404
    shm_size: 2gb
    environment:
      SE_NODE_ENABLE_CDP: "false"
      SE_NODE_ENABLE_BIDI: "false"
      SE_NODE_SESSION_TIMEOUT: "120"
    depends_on:
      web-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s




volumes:
  minio-data:
  postgres-data:
